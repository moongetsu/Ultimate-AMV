name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      # ── Node ──────────────────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # ── Rust ──────────────────────────────────────────────────────────────
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # ── Bundled Python (embeddable) ────────────────────────────────────────
      - name: Download embeddable Python 3.13
        shell: pwsh
        run: |
          $url = "https://www.python.org/ftp/python/3.13.2/python-3.13.2-embed-amd64.zip"
          $zip = "$env:TEMP\python-embed.zip"
          Invoke-WebRequest -Uri $url -OutFile $zip
          Expand-Archive -Path $zip -DestinationPath python -Force
          Remove-Item $zip

      - name: Bootstrap pip + base packages into bundled Python
        shell: pwsh
        run: ./bundle-deps.ps1

      # ── Bundled tools (yt-dlp, ffmpeg, ffprobe) ───────────────────────────
      - name: Download yt-dlp
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path tools | Out-Null
          Invoke-WebRequest -Uri "https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe" -OutFile "tools\yt-dlp.exe"

      - name: Download ffmpeg + ffprobe
        shell: pwsh
        run: |
          $url = "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip"
          $zip = "$env:TEMP\ffmpeg.zip"
          Invoke-WebRequest -Uri $url -OutFile $zip
          $tmp = "$env:TEMP\ffmpeg-extract"
          Expand-Archive -Path $zip -DestinationPath $tmp -Force
          $bin = Get-ChildItem -Path $tmp -Recurse -Filter "ffmpeg.exe" | Select-Object -First 1
          Copy-Item $bin.FullName -Destination "tools\ffmpeg.exe"
          $bin2 = Get-ChildItem -Path $tmp -Recurse -Filter "ffprobe.exe" | Select-Object -First 1
          Copy-Item $bin2.FullName -Destination "tools\ffprobe.exe"
          Remove-Item $zip, $tmp -Recurse -Force

      - name: Download FFmpeg shared DLLs (for nelux clip extractor)
        shell: pwsh
        run: |
          # nelux's C extension loads libavcodec / libavformat / etc. via
          # Windows DLL search at import time. clip_cli.py registers
          # tools\ffmpeg-shared\ with os.add_dll_directory, so the shared-
          # build FFmpeg DLLs must live there in the installer bundle. The
          # static ffmpeg.exe step above does NOT provide these — it's a
          # single fat binary with everything statically linked, so it
          # works for the bundled tools but cannot satisfy nelux.
          #
          # Pinned to the n8.1 branch because nelux's current wheel is
          # built against libavcodec.so.62 (the major in FFmpeg 8.x — 8.0
          # shipped 62.x, 8.1 stays 62.x, ABI-compatible). If BtbN ever
          # stops publishing n8.1 shared builds — or nelux's wheel jumps
          # to a newer avcodec major (likely libavcodec.so.63 with the
          # FFmpeg 9.0 cut) — update this URL accordingly. Master builds
          # would NOT work today because master is already FFmpeg 9-pre
          # and ships avcodec-63.dll.
          $url = "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-n8.1-latest-win64-gpl-shared-8.1.zip"
          $zip = "$env:TEMP\ffmpeg-shared.zip"
          Invoke-WebRequest -Uri $url -OutFile $zip
          $tmp = "$env:TEMP\ffmpeg-shared-extract"
          Expand-Archive -Path $zip -DestinationPath $tmp -Force
          New-Item -ItemType Directory -Force -Path "tools\ffmpeg-shared" | Out-Null
          # BtbN's shared zip puts DLLs in <root>\bin\; we want the DLLs
          # flat under tools\ffmpeg-shared\ (matching clip_cli.py's path).
          Get-ChildItem -Path $tmp -Recurse -Filter "*.dll" |
            Where-Object { $_.FullName -like '*\bin\*' } |
            ForEach-Object { Copy-Item $_.FullName -Destination "tools\ffmpeg-shared\$($_.Name)" }
          $copied = Get-ChildItem -Path "tools\ffmpeg-shared" -Filter "*.dll"
          if ($copied.Count -eq 0) {
            Write-Error "No DLLs were copied into tools\ffmpeg-shared\. BtbN may have changed the zip layout — inspect $tmp and update this step."
            exit 1
          }
          Write-Host "Staged $($copied.Count) FFmpeg shared DLLs for nelux:"
          $copied | ForEach-Object { Write-Host "  $($_.Name)" }
          Remove-Item $zip, $tmp -Recurse -Force

      # ── Frontend + Tauri build ─────────────────────────────────────────────
      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri app
        run: npm run tauri build

      # ── Publish GitHub Release ─────────────────────────────────────────────
      - name: Extract release notes from CHANGELOG
        id: notes
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          $changelog = Get-Content CHANGELOG.md -Raw
          # Match "## [VERSION] — ..." up to the next "## [" header or the
          # link reference block at the bottom (lines starting with "[X.Y.Z]:").
          $pattern = "(?ms)^## \[$([regex]::Escape($version))\][^\n]*\n.*?(?=^## \[|^\[\d+\.\d+\.\d+\]:)"
          $match = [regex]::Match($changelog, $pattern)
          if (-not $match.Success) {
            Write-Error "No CHANGELOG section found for $version. Add a '## [$version] — YYYY-MM-DD' block before tagging."
            exit 1
          }
          $match.Value.TrimEnd() | Out-File -FilePath release-notes.md -Encoding utf8
          Write-Host "::group::release-notes.md"
          Get-Content release-notes.md
          Write-Host "::endgroup::"

      - name: Upload installer to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
          body_path: release-notes.md
