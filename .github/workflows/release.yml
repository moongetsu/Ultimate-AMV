name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      # ── Node ──────────────────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # ── Rust ──────────────────────────────────────────────────────────────
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # ── Bundled Python (embeddable) ────────────────────────────────────────
      - name: Download embeddable Python 3.13
        shell: pwsh
        run: |
          $url = "https://www.python.org/ftp/python/3.13.2/python-3.13.2-embed-amd64.zip"
          $zip = "$env:TEMP\python-embed.zip"
          Invoke-WebRequest -Uri $url -OutFile $zip
          Expand-Archive -Path $zip -DestinationPath python -Force
          Remove-Item $zip

      - name: Bootstrap pip + base packages into bundled Python
        shell: pwsh
        run: ./bundle-deps.ps1

      # ── Tools manifest sanity check ───────────────────────────────────────
      # tools/ is no longer bundled into the installer. The app downloads
      # ffmpeg/ffprobe/yt-dlp on first launch into a per-user cache,
      # verified against the SHA256s pinned in tools.json. CI just makes
      # sure the manifest is parseable before kicking off the bundle.
      - name: Validate tools.json
        shell: pwsh
        run: |
          if (-not (Test-Path tools.json)) {
            Write-Error "tools.json missing at repo root."
            exit 1
          }
          try {
            $manifest = Get-Content tools.json -Raw | ConvertFrom-Json
          } catch {
            Write-Error "tools.json failed to parse: $($_.Exception.Message)"
            exit 1
          }
          Write-Host "tools.json manifest_version=$($manifest.manifest_version) binaries=$($manifest.binaries.Count)"

      # ── Frontend + Tauri build ─────────────────────────────────────────────
      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri build

      # ── Publish GitHub Release ─────────────────────────────────────────────
      - name: Extract release notes from CHANGELOG
        id: notes
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          $changelog = Get-Content CHANGELOG.md -Raw
          # Match "## [VERSION] : ..." up to the next "## [" header or the
          # link reference block at the bottom (lines starting with "[X.Y.Z]:").
          $pattern = "(?ms)^## \[$([regex]::Escape($version))\][^\n]*\n.*?(?=^## \[|^\[\d+\.\d+\.\d+\]:)"
          $match = [regex]::Match($changelog, $pattern)
          if (-not $match.Success) {
            Write-Error "No CHANGELOG section found for $version. Add a '## [$version] : YYYY-MM-DD' block before tagging."
            exit 1
          }
          $match.Value.TrimEnd() | Out-File -FilePath release-notes.md -Encoding utf8
          Write-Host "::group::release-notes.md"
          Get-Content release-notes.md
          Write-Host "::endgroup::"

      - name: Generate updater manifest (latest.json)
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          $bundleDir = "src-tauri/target/release/bundle/nsis"
          $exe = Get-ChildItem -Path $bundleDir -Filter "*.exe" | Select-Object -First 1
          if (-not $exe) { Write-Error "No .exe found in $bundleDir"; exit 1 }
          $sig = Get-ChildItem -Path $bundleDir -Filter "*.exe.sig" | Select-Object -First 1
          if (-not $sig) { Write-Error "No .exe.sig found in $bundleDir. Did TAURI_SIGNING_PRIVATE_KEY get set on the build step?"; exit 1 }
          $signature = Get-Content $sig.FullName -Raw
          $notes = Get-Content release-notes.md -Raw
          $pubDate = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ss.fffZ")
          # GitHub Releases rewrites spaces in uploaded asset filenames to dots
          # (e.g. "Ultimate AMV_0.6.0_x64-setup.exe" → "Ultimate.AMV_0.6.0_x64-setup.exe"),
          # so the local filename and the public download URL diverge. Mirror that
          # transform here, otherwise the updater fetches a 404.
          $assetName = $exe.Name.Replace(' ', '.')
          $downloadUrl = "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/$assetName"
          $manifest = @{
            version = $version
            notes = $notes
            pub_date = $pubDate
            platforms = @{
              "windows-x86_64" = @{
                signature = $signature.Trim()
                url = $downloadUrl
              }
            }
          }
          $json = $manifest | ConvertTo-Json -Depth 10
          Set-Content -Path latest.json -Value $json -Encoding utf8
          Write-Host "::group::latest.json"
          Get-Content latest.json
          Write-Host "::endgroup::"

      - name: Upload installer to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.exe.sig
            latest.json
            tools.json
          body_path: release-notes.md
